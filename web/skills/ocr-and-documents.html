<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>ocr-and-documents - Hermes Skills</title>
    <style>
:root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui; background: var(--bg); color: var(--text); line-height: 1.6; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); }
header h1 { font-size: 3em; margin-bottom: 10px; }
header p { opacity: 0.9; font-size: 1.2em; }
.search-box { max-width: 600px; margin: 30px auto; }
.search-box input { width: 100%; padding: 15px 25px; font-size: 1.1em; border: none; border-radius: 50px; outline: none; }
.categories { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 30px 0; }
.category-tag { background: var(--card); padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
.category-tag:hover, .category-tag.active { background: var(--primary); }
.skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
.skill-card { background: var(--card); border-radius: 12px; padding: 25px; transition: transform 0.2s; }
.skill-card:hover { transform: translateY(-5px); }
.skill-card h3 { color: var(--primary); margin-bottom: 10px; }
.skill-card p { opacity: 0.8; font-size: 0.95em; margin-bottom: 15px; }
.skill-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 0.85em; opacity: 0.7; }
.tag { background: rgba(99,102,241,0.2); padding: 4px 10px; border-radius: 15px; }
.install-cmd { background: #0f172a; padding: 10px 15px; border-radius: 8px; font-family: monospace; margin-top: 15px; font-size: 0.9em; }
footer { text-align: center; padding: 40px; margin-top: 60px; opacity: 0.7; border-top: 1px solid var(--card); }
</style>
</head>
<body>
