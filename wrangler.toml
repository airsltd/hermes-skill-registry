# Cloudflare Pages 部署配置
# 将此文件放在项目根目录

[build]
# 构建命令（如果有构建步骤）
command = "python scripts/sync-skills.py && python scripts/build-site.py"

# 发布目录
publish = "web"

[build.environment]
# 环境变量（如需要）
PYTHON_VERSION = "3.11"

# 预览部署配置
[preview]
# 预览分支
branch = "main"

# 生产部署配置
[production]
# 生产分支
branch = "main"